<section class="py-5 bg-light">
  <div class="container">

    <!-- Header -->
    <div class="text-center mb-5">
      <h2 class="fw-bold">Our Categories</h2>
      <p class="text-muted">Explore our wide range of high-quality fastening solutions</p>
    </div>

    <!-- Category Grid -->
    <div class="row g-4">

      <!-- Category Card -->
      <div class="col-md-4 col-lg-3 col-sm-6" *ngFor="let category of categories">
        <div class="category-card h-100 p-4 text-center">

          <!-- Icon -->
          <div class="category-icon mb-3">
            {{category.icon}}
          </div>

          <!-- Title -->
          <h5 class="fw-bold">{{category.name}}</h5>

          <!-- Description -->
          <p class="text-muted small">
            {{category.description}}
          </p>

          <!-- Button -->
          <a routerLink="/products" class="btn btn-outline-primary btn-sm mt-2">
            View Products →
          </a>

        </div>
      </div>

    </div>

  </div>
</section>
