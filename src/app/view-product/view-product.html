<div class="container py-3">
    <div class="row">
        <div class="col-md-6 col-sm-12">
            <label for="category">Choose a Category</label>
            <select #cat class="form-select my-3 border-1" (change)="filterProducts(cat.value)">
                <option value="all" selected>All</option>
                <option value="threaded">Threaded Rod</option>
                <option value="stud">Stud Bolts</option>
                <option value="hex">Hex Nuts</option>
                <option value="anchor">Anchor Bolts</option>
                <option value="washer">Washer</option>
            </select>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-3" *ngFor="let product of filteredProducts">

            <div class="card p-3 shadow-sm">
                <img [src]="product.image" class="img-fluid mb-2">

                <h5>{{product.name}}</h5>
                <p class="text-primary fw-bold">₹{{product.price}}</p>

            </div>

        </div>
    </div>
</div>
